<body>
  <div class="header">
    <h1>NapraviMi</h1>
  </div>
  <div class="center-page">
    <p-card [style]="{ width: '420px' }">
      <div *ngIf="errorMessage" class="mb-3">
        <p-message severity="error">{{ errorMessage }}</p-message>
      </div>
      <div *ngIf="successMessage" class="mb-3">
        <p-message severity="success">{{ successMessage }}</p-message>
      </div>

      <form [formGroup]="changeForm" (ngSubmit)="submit()" class="p-fluid">
        <div class="field flex flex-column">
          <label for="username">Korisničko ime</label>
          <input pInputText id="username" formControlName="username" />
        </div>

        <div class="field flex flex-column">
          <label for="new_password">Nova lozinka</label>
          <p-password
            id="new_password"
            formControlName="new_password"
            [toggleMask]="true"
          ></p-password>
        </div>

        <div class="field flex flex-column">
          <label for="confirm_password">Potvrdite novu lozinku</label>
          <p-password
            id="confirm_password"
            formControlName="confirm_password"
            [toggleMask]="true"
            [feedback]="false"
          ></p-password>
          <div *ngIf="changeForm.errors?.['passwordsMismatch']" class="p-error">
            Lozinke se ne poklapaju.
          </div>
        </div>

        <div class="w-full mt-4">
          <button
            pButton
            type="submit"
            label="Izmeni lozinku"
            [disabled]="changeForm.invalid || submitting"
            style="width: 100%"
          ></button>
        </div>
      </form>
    </p-card>
  </div>
</body>
