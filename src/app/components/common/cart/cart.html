<div class="card">
  @let state = (state$ | async);
  <p-table [value]="state?.cartItems!" [tableStyle]="{ 'min-width': '60rem' }">
   
    <ng-template #header>
      <tr>
        <th>Назив</th>
        <th>Количина</th>
        <th>Цена</th>
        <th>Оцена</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>{{ item.product.name }}</td>
        <td>
          {{item.quantity}}
        </td>
        <td>{{ item.product.price }} РСД</td>
        <td><p-rating [(ngModel)]="item.product.rating" [readonly]="true" /></td>
        <td>
          <p-button label="Избаци из корпе" severity="danger" (onClick)="removeFromCart(item)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #footer>
      <tr>
        <td colspan="6">
          <div class="cart-footer">
            <span>Укупна цена: {{ state?.total_price }}</span>
            <p-button label="Плаћање" severity="success" (onClick)="placeOrder()" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
