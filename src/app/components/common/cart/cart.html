<div class="card">
  @let state = (state$ | async);
  <p-table class="cart-table" [value]="state?.cartItems!">

    <ng-template #header>
      <tr>
        <th>Назив</th>
        <th>Количина</th>
        <th>Цена</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td data-label="Назив"><span class="cart-cell-value">{{ item.product.name }}</span></td>
        <td data-label="Количина">
          <span class="cart-cell-value">{{item.quantity}}</span>
        </td>
        <td data-label="Цена"><span class="cart-cell-value">{{ item.product.price }} РСД</span></td>
        <td>
          <p-button label="Избаци из корпе" severity="danger" (onClick)="removeFromCart(item)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #footer>
      <tr>
        <td colspan="4">
          <div class="cart-footer">
            <span>Укупна цена: {{ state?.total_price }}</span>
            <p-button label="Плаћање" severity="success" (onClick)="placeOrder()" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
