<div class="header" [class.logo-only]="logoOnly">
  @let state = (state$ | async);
  @if (state; as headerState) {
  <a routerLink="/" class="logo-link">
    <img
      [src]="themeService.isDark() ? 'images/napravimi-logo-dark.svg' : 'images/napravimi-logo-light.svg'"
      alt="НаправиМи"
      class="header-logo"
    />
  </a>
  @if (!logoOnly) {
    <div class="actions-row">
      <div class="page-top-actions">
        @if (!hideSearchAndTheme) {
          <div class="search-row">
            <div class="search-wrapper">
              <input
                pInputText
                [(ngModel)]="searchQuery"
                placeholder="Претражи занатлије..."
                (keyup.enter)="onSearch()"
              />
              <button
                type="button"
                class="search-icon-btn"
                aria-label="Претражи"
                (click)="onSearch()"
              >
                <i class="pi pi-search"></i>
              </button>
            </div>
            <button
              type="button"
              class="theme-toggle-btn"
              [attr.aria-label]="themeService.isDark() ? 'Укључи светлу тему' : 'Укључи тамну тему'"
              (click)="themeService.toggle()"
            >
              <i class="pi" [class.pi-sun]="themeService.isDark()" [class.pi-moon]="!themeService.isDark()"></i>
            </button>
          </div>
        }
        @if (!headerState.isLoggedIn) {
          <button
            pButton
            [outlined]="true"
            label="Региструј се"
            icon="pi pi-user-plus"
            routerLink="/user-registration"
          ></button>
          <button pButton severity="contrast" label="Пријави се" icon="pi pi-sign-in" routerLink="/login"></button>
        }
      </div>
      <div class="header-icons">
        @if (headerState.isUser) {
          <p-button
            icon="pi pi-shopping-cart"
            [badge]="headerState.cartItemCount > 0 ? headerState.cartItemCount.toString() : ''"
            badgeSeverity="danger"
            routerLink="/user/cart"
            text="true"
          ></p-button>
        }
        @if (headerState.isLoggedIn) {
          <app-user-actions [user]="headerState.currentUser"></app-user-actions>
        }
      </div>
    </div>
  }
  }
</div>
