<body>
  <app-header></app-header>

  <app-navbar></app-navbar>
  <div class="grid">
    <div class="flex-row">
      <div class="col-4">
        <div class="mb-4 p-8">
          <p-card>
            <p-image src="{{ user.profilePicture }}"></p-image>
          </p-card>
        </div>
      </div>
      <div class="col-8">
        <div class="mb-4 p-8">
          <p-card>
            <h2>{{ user.firstname }} {{ user.lastname }}</h2>
            <p>{{ user.craft }}</p>           
            <p>{{ user.email }}</p>
          </p-card>
        </div>
      </div>
    </div>
  </div>

  @if (user.craft) {
    <app-products-by-craftsman [username]="user.username"></app-products-by-craftsman>
  }
</body>
