  @let state = (state$ | async);
  <app-header [logoOnly]="true"></app-header>

  <div class="center-page">
    <div class="form-wrapper flex flex-column">
      <div class="mb-3">
        <p-message
          severity="info"
          [text]="messageText"
          escape="false"
        ></p-message>
      </div>

      <div class="mb-3" *ngIf="state?.statusMessage">
        <p-message
          [severity]="state?.statusSeverity"
          [text]="state?.statusMessage"
        ></p-message>
      </div>

      <p-card [style]="{ width: '100%' }">
        <ng-template pTemplate="header">
          <div class="application-header">Пријава за занатлију</div>
        </ng-template>

        <form [formGroup]="applicationForm" (ngSubmit)="onSubmit()" class="p-fluid">
        <div class="field flex flex-column">
          <label for="email">Е-пошта</label>
          <input pInputText id="email" type="email" formControlName="email" />
        </div>

        <div class="field flex flex-column">
          <label for="craft">Занат</label>
          <p-select
            id="craft"
            [options]="state?.craftOptions"
            optionLabel="label"
            optionValue="value"
            formControlName="craft"
            placeholder="Изабери занат"
            appendTo="body"
          ></p-select>
        </div>

        <div class="field flex flex-column">
          <label for="resumeUpload">Биографија (PDF)</label>
          <p-fileUpload
            name="resume"
            accept="application/pdf"
            customUpload="true"
            chooseLabel="Изабери PDF"
            [showUploadButton]="false"
            [showCancelButton]="true"
            [auto]="false"
            (onSelect)="onResumeSelected($event)"
            (onRemove)="onResumeRemoved()"
          ></p-fileUpload>
        </div>

        @if (state?.selectedResumeName) {
          <div class="field">
            <small>Изабрани фајл: {{ state?.selectedResumeName }}</small>
          </div>
        }

        <div class="w-full mt-4">
          <button
            pButton
            type="submit"
            label="Пошаљи пријаву"
            [disabled]="!resumeFile || applicationForm.invalid"
            style="width: 100%"
          ></button>
        </div>
      </form>
    </p-card>
    </div>
  </div>
