<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
<div class="craftsman-applications-page">
  @let state = (state$ | async);
  <h2>Zahtevi za ulogu zanatlije</h2>

  <p-table
    [value]="state?.applications ?? []"
    [paginator]="true"
    [first]="state?.first ?? 0"
    [rows]="state?.rows ?? 5"
    [totalRecords]="state?.totalRecords ?? 0"
    [lazy]="true"
    (onLazyLoad)="pageChange($event)"
    [rowsPerPageOptions]="[5, 10, 15]"
    [loading]="state?.isLoading ?? false"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Zanat</th>
        <th>Status</th>
        <th>Datum podnošenja</th>
        <th>CV</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-app>
      <tr>
        <td>{{ app.id }}</td>
        <td>{{ app.email }}</td>
        <td>{{ app.craftLabel }}</td>
        <td>
          <p-select
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="app.newStatus"
            placeholder="Izaberi status"
            appendTo="body"
            (onChange)="onStatusChange($event, app)"
          >
            <ng-template let-selectedItem pTemplate="selectedItem">
              <span>
                {{ selectedItem?.label || (app.status | titlecase) }}
              </span>
            </ng-template>
          </p-select>
        </td>
        <td>{{ app.createdAt | date: 'short' }}</td>
        <td>
          @if (app.resumeUrl) {
            <p-button label="Otvori" size="small" severity="help" (onClick)="openResume(app)" />
          } @else {
            <span>-</span>
          }
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
